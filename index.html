<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 Eğitici Oyunlar</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --yellow: #FFD600;
      --orange: #FF6B35;
      --pink: #FF4D8D;
      --teal: #00C9A7;
      --blue: #4D9FFF;
      --purple: #A855F7;
      --bg: #FFF8F0;
      --card-shadow: 0 8px 0px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 10% 20%, #FFE08A33 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #FF4D8D22 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #4D9FFF11 0%, transparent 60%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #FF6B35, #FF4D8D, #A855F7);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -50px; left: 30%;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      color: white;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo span { font-size: 2.4rem; }

    .header-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 50px 20px 30px;
    }
    .hero h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #2D2D2D;
      line-height: 1.2;
    }
    .hero h2 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.15rem;
      color: #666;
      margin-top: 12px;
      font-weight: 600;
    }

    /* FLOATING SHAPES */
    .floaties {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .floatie {
      position: absolute;
      font-size: 2rem;
      opacity: 0.08;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.08; }
      90%  { opacity: 0.08; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* MAIN CONTENT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* CATEGORY SECTION */
    .category-section {
      margin-bottom: 50px;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .category-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .category-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.75rem;
      color: #2D2D2D;
    }
    .category-count {
      font-size: 0.9rem;
      font-weight: 700;
      color: #999;
      margin-top: 2px;
    }
    .category-line {
      flex: 1;
      height: 3px;
      border-radius: 99px;
      margin-left: 8px;
    }

    /* GAME GRID */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
    }

    /* GAME CARD */
    .game-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      border: 3px solid transparent;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      position: relative;
    }
    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 0px rgba(0,0,0,0.12);
    }

    .game-thumb {
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }
    .game-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.1));
    }

    .game-info {
      padding: 16px;
    }
    .game-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      color: #2D2D2D;
      margin-bottom: 6px;
    }
    .game-desc {
      font-size: 0.85rem;
      color: #777;
      line-height: 1.5;
      font-weight: 600;
    }
    .game-sinif {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.78rem;
      font-weight: 800;
      color: #999;
      background: #F5F5F5;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 14px 16px 16px;
      padding: 12px;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      text-decoration: none;
      text-align: center;
    }
    .play-btn:hover {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }
    .play-btn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    /* MODAL - TAM EKRAN */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: block;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* Floating butonlar - sağ üst köşe */
    .modal-controls {
      position: fixed;
      top: 9vh;
      right: 8px;
      z-index: 10001;
      display: flex;
      gap: 10px;
    }
    .modal-btn {
      width: 35px;
      height: 35px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      font-weight: 900;
    }
    .modal-btn:hover { transform: scale(1.1); }
    .modal-btn:active { transform: scale(0.93); }
    .modal-btn-close  { background: #FF4D8D; color: white; }

    .modal-body {
      position: fixed;
      inset: 0;
    }
    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      font-weight: 700;
      color: #aaa;
      font-size: 0.9rem;
      position: relative;
      z-index: 1;
    }
    footer span {
      color: var(--pink);
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .logo { font-size: 1.7rem; }
      .hero { padding: 30px 16px 20px; }
      main { padding: 10px 14px 40px; }
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .game-thumb { height: 110px; font-size: 3rem; }
      .modal-body iframe { min-height: 340px; }
    }
    /* CONFETTI */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Floating decorations -->
<div class="floaties" id="floaties"></div>

<!-- HEADER -->
<header>
  <div class="logo"><span>🎮</span> Eğitici Oyunlar</div>
  <div class="header-badges">
    <div class="badge">✨ Ücretsiz</div>
    <div class="badge">📱 Mobil Uyumlu</div>
    <div class="badge">🎯 Eğlenceli</div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h2>Merhaba! <em>Hadi Oynayalım</em> 🎉</h2>
  <p>Favori oyununu seç ve anında başla!</p>
</div>

<!-- MAIN -->
<main id="main-content"></main>

<!-- MODAL - TAM EKRAN -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-controls">
    <button class="modal-btn modal-btn-close"  onclick="closeModal()" title="Kapat">✕</button>
  </div>
  <div class="modal">
    <div class="modal-body">
      <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>
  </div>
</div>

<footer>Tüm oyunlar <span>❤️</span> ile yapıldı</footer>

<script>
// ============================================================
// OYUN VERİLERİ — Buraya kendi oyunlarını ekle!
// her oyun için: name, file (html dosya yolu), desc, emoji
// ============================================================
const categories = [
  {
    name: "➕ Matematik",
    color: "#FF6B35",
    iconBg: "linear-gradient(135deg, #FF6B35, #FFD600)",
    lineColor: "linear-gradient(90deg, #FF6B35, #FFD600)",
    games: [
      {
        name: "Balon Patlatma",
        file: "balon.html",
        desc: "Toplama ve çıkarma işlemleriyle balonları patlat! 🎈",
        sinif: "1. Sınıf",
        emoji: "🎈",
        thumbBg: "linear-gradient(135deg, #FFF0E0, #FFD6B8)"
      },
      {
        name: "Köprü Oyunu",
        file: "kopru.html",
        desc: "Toplama ve çıkarma yaparak köprüyü tamamla! 🌉",
        sinif: "1. Sınıf",
        emoji: "🌉",
        thumbBg: "linear-gradient(135deg, #FFF8E0, #FFE8A0)"
      },
      {
        name: "Roket Yakıtı",
        file: "roket.html",
        desc: "Doğru hesapla roketi uzaya fırlat! 🚀",
        sinif: "1. Sınıf",
        emoji: "🚀",
        thumbBg: "linear-gradient(135deg, #E8F4FF, #C0DCFF)"
      },
      {
        name: "Terazi Dengeleme Oyunu",
        file: "terazi.html",
        desc: "Teraziyi dengele, eşitlik kavramını öğren! ⚖️",
        sinif: "1. Sınıf",
        emoji: "⚖️",
        thumbBg: "linear-gradient(135deg, #E8FFE8, #B8F0C0)"
      },
      {
        name: "Sünger Bob",
        file: "sungerbob.html",
        desc: "Toplama ve çıkarma işlemi 🧽",
        sinif: "1. Sınıf",
        emoji: "🧽",
        thumbBg: "linear-gradient(135deg, #FFF9C4, #FFE082)"
      },
      {
        name: "Timsahı Doyur",
        file: "timsah.html",
        desc: "Toplamada ve çıkarmada bilinmeyeni bulma 🐊",
        sinif: "1. Sınıf",
        emoji: "🐊",
        thumbBg: "linear-gradient(135deg, #DFFFD6, #A5D6A7)"
      }
    ]
  },
  {
    name: "📖 Türkçe",
    color: "#00C9A7",
    iconBg: "linear-gradient(135deg, #00C9A7, #4D9FFF)",
    lineColor: "linear-gradient(90deg, #00C9A7, #4D9FFF)",
    games: [
      {
        name: "Hecelerden Kelimelere",
        file: "hece.html",
        desc: "Heceleri birleştirerek kelimeler oluştur! 🔤",
        sinif: "1. Sınıf",
        emoji: "🔤",
        thumbBg: "linear-gradient(135deg, #E0FFF7, #B8FFF0)"
      },
      {
        name: "Noktalama Parşomeni",
        file: "nokta.html",
        desc: "Noktalama işaretlerini doğru yerlere yerleştir! 📜",
        sinif: "1. Sınıf",
        emoji: "📜",
        thumbBg: "linear-gradient(135deg, #FFF9E0, #FFEDB8)"
      }
    ]
  },
  {
    name: "🌍 PYP",
    color: "#A855F7",
    iconBg: "linear-gradient(135deg, #A855F7, #FF4D8D)",
    lineColor: "linear-gradient(90deg, #A855F7, #FF4D8D)",
    games: [
      {
        name: "Öğrenen Profilleri",
        file: "pyp.html",
        desc: "PYP öğrenen profillerini keşfet ve öğren! 🌟",
        sinif: "1-4. Sınıf",
        emoji: "🌟",
        thumbBg: "linear-gradient(135deg, #F3E8FF, #E0C8FF)"
      }
    ]
  }
];

// ============================================================
// SAYFA OLUŞTURMA
// ============================================================
function buildPage() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  categories.forEach((cat, ci) => {
    const section = document.createElement('section');
    section.className = 'category-section';
    section.style.animationDelay = `${ci * 0.12}s`;

    // Category header
    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <div class="category-icon" style="background:${cat.iconBg}">${cat.name.split(' ')[0]}</div>
      <div>
        <div class="category-title">${cat.name.slice(cat.name.indexOf(' ')+1)}</div>
        <div class="category-count">${cat.games.length} oyun</div>
      </div>
      <div class="category-line" style="background:${cat.lineColor}"></div>
    `;

    // Game grid
    const grid = document.createElement('div');
    grid.className = 'game-grid';

    cat.games.forEach((game, gi) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.style.borderColor = cat.color + '33';
      card.style.animationDelay = `${ci * 0.1 + gi * 0.08}s`;
      card.innerHTML = `
        <div class="game-thumb" style="background:${game.thumbBg}">
          ${game.emoji}
        </div>
        <div class="game-info">
          <div class="game-name">${game.name}</div>
          <div class="game-desc">${game.desc}</div>
          <div class="game-sinif">🎒 ${game.sinif}</div>
        </div>
        <div class="play-btn" style="background:${cat.iconBg}" onclick="openGame('${game.file}', '${game.name}')">
          ▶ Oyna!
        </div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(grid);
    main.appendChild(section);
  });
}

// ============================================================
// MODAL
// ============================================================
function openGame(file, name) {
  document.getElementById('game-frame').src = file;
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function reloadGame() {
  const f = document.getElementById('game-frame');
  f.src = f.src;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.getElementById('game-frame').src = '';
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================================
// FLOATING EMOJIS
// ============================================================
function addFloaties() {
  const emojis = ['🎮','⭐','🎯','🏆','🎲','🕹️','🎪','🌟','💫','🎉'];
  const container = document.getElementById('floaties');
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'floatie';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (12 + Math.random() * 20) + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    container.appendChild(el);
  }
}

// ============================================================
// KONFETİ — Sadece ilk açılışta
// ============================================================
function launchConfetti() {
  const colors = ['#FF6B35','#FFD600','#FF4D8D','#00C9A7','#4D9FFF','#A855F7','#fff'];
  for (let i = 0; i < 120; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.width  = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const dur = 2.5 + Math.random() * 2.5;
    const delay = Math.random() * 1.8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    if (Math.random() > 0.5) el.style.borderRadius = '50%';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 200);
  }
}

buildPage();
addFloaties();

// Konfeti sadece sayfaya ilk girişte
if (!sessionStorage.getItem('confettiShown')) {
  sessionStorage.setItem('confettiShown', '1');
  setTimeout(launchConfetti, 200);
}
</script>
</body>
</html>
