<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍎 Terazi Oyunu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@700;900&display=swap');
:root{--success:#2ECC71;--error:#E74C3C;--gold:#FFD700;--text-dark:#2C1810;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Baloo 2',cursive;background:linear-gradient(180deg,#87CEEB 0%,#b8e4f7 40%,#d4f0b0 70%,#5DBB63 100%);min-height:100vh;overflow:hidden;user-select:none;}
.cloud{position:fixed;background:white;border-radius:50px;opacity:.8;animation:drift linear infinite;pointer-events:none;z-index:1;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:120px;height:38px;top:7%;left:-140px;animation-duration:30s;}.c1::before{width:58px;height:52px;top:-26px;left:14px;}.c1::after{width:44px;height:40px;top:-20px;left:50px;}
.c2{width:90px;height:28px;top:16%;left:-110px;animation-duration:42s;animation-delay:-15s;}.c2::before{width:44px;height:38px;top:-20px;left:10px;}.c2::after{width:34px;height:30px;top:-14px;left:36px;}
.c3{width:100px;height:32px;top:4%;left:-120px;animation-duration:52s;animation-delay:-28s;}.c3::before{width:48px;height:44px;top:-22px;left:12px;}.c3::after{width:38px;height:34px;top:-16px;left:42px;}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(110vw)}}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.screen.hidden{display:none!important;}
#screen-menu,#screen-difficulty,#screen-cutscene,#screen-win{background:linear-gradient(180deg,#87CEEB 0%,#b8e4f7 50%,#d4f0b0 80%,#5DBB63 100%);}
#screen-cutscene{z-index:50;}#screen-win{z-index:60;}
.menu-card,.diff-card{background:rgba(255,255,255,.93);border-radius:28px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 0 0 4px #FFD700;text-align:center;width:90vw;max-width:460px;}
.menu-card{padding:36px 40px;}.diff-card{padding:22px 26px;}
.menu-icon{font-size:64px;margin-bottom:10px;animation:floatIcon 2.5s ease-in-out infinite;display:block;}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.menu-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(28px,7vw,46px);color:#8B4513;line-height:1.1;margin-bottom:6px;}
.menu-sub{font-size:clamp(13px,3vw,17px);color:#777;font-weight:600;margin-bottom:28px;}
.btn-green{background:linear-gradient(135deg,#27AE60,#1A8A45);color:white;border:none;border-radius:50px;padding:14px 40px;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(18px,4vw,24px);cursor:pointer;box-shadow:0 5px 0 #0e5c2a,0 8px 20px rgba(39,174,96,.35);transition:transform .1s,box-shadow .1s;width:100%;}
.btn-green:active{transform:translateY(4px);box-shadow:0 1px 0 #0e5c2a;}
.diff-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,5vw,28px);color:#8B4513;margin-bottom:3px;}
.diff-sub{font-size:clamp(11px,2.5vw,13px);color:#888;margin-bottom:14px;}
.diff-btns{display:flex;gap:8px;flex-direction:column;}
.btn-diff{border:none;border-radius:16px;padding:12px 14px;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:800;text-align:left;display:flex;align-items:center;gap:12px;transition:transform .12s;}
.btn-diff:active{transform:scale(.97);}
.bd1{background:linear-gradient(135deg,#27AE60,#1A8A45);color:white;box-shadow:0 4px 0 #0e5c2a;}
.bd2{background:linear-gradient(135deg,#FF8C42,#E05500);color:white;box-shadow:0 4px 0 #9B3A00;}
.bd3{background:linear-gradient(135deg,#9B59B6,#6C3483);color:white;box-shadow:0 4px 0 #3D1A5E;}
.bd-icon{font-size:28px;flex-shrink:0;}.bd-name{font-size:clamp(13px,3vw,16px);display:block;}.bd-desc{font-size:clamp(9px,1.8vw,11px);opacity:.85;font-weight:600;display:block;margin-top:1px;}
.btn-back{background:none;border:2px solid rgba(139,94,60,.3);border-radius:30px;padding:6px 18px;margin-top:10px;font-family:'Baloo 2',cursive;font-weight:700;font-size:13px;color:#8B4513;cursor:pointer;}
.cutscene-inner,.win-inner{display:flex;flex-direction:column;align-items:center;gap:8px;}
.farmer-img-el{width:clamp(150px,32vw,220px);height:auto;animation:farmerBounce .6s ease-out;}
@keyframes farmerBounce{0%{transform:translateY(60px);opacity:0}100%{transform:translateY(0);opacity:1}}
.speech-bubble,.win-bubble{background:white;border-radius:20px;padding:14px 20px;box-shadow:0 4px 20px rgba(0,0,0,.18),0 0 0 3px #FFD700;max-width:clamp(260px,70vw,380px);text-align:center;position:relative;font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(14px,3.5vw,20px);color:#3A1A00;margin-bottom:6px;}
.speech-bubble{animation:bubblePop .4s .5s both cubic-bezier(.34,1.56,.64,1);}
.speech-bubble::after,.win-bubble::after{content:'';position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:white;}
.speech-bubble .gold,.win-bubble .gold{color:#D4800A;}
@keyframes bubblePop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
#cutscene-btn{animation:popIn .4s 1.4s both cubic-bezier(.34,1.56,.64,1);}
.win-bubble{box-shadow:0 4px 20px rgba(0,0,0,.18),0 0 0 3px #2ECC71;}
.win-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,5vw,30px);color:#8B4513;background:rgba(255,255,255,.9);border-radius:16px;padding:8px 24px;box-shadow:0 0 0 3px #FFD700;}
/* GAME */
#screen-game{flex-direction:column;padding:6px 6px 0;gap:3px;justify-content:flex-start;overflow:hidden;}
#game-header{display:flex;align-items:center;justify-content:space-between;width:min(98vw,600px);padding:2px 4px;gap:8px;}
#home-btn{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:4px 12px;cursor:pointer;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.12);flex-shrink:0;}
#score-display{background:rgba(255,255,255,.9);border-radius:20px;padding:4px 12px;font-weight:800;font-size:clamp(11px,2.2vw,14px);color:var(--text-dark);box-shadow:0 2px 10px rgba(0,0,0,.12);flex-shrink:0;}
#progress-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
#progress-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(10px,2vw,13px);color:#5C3000;}
#progress-track{width:100%;height:14px;background:rgba(0,0,0,.15);border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.2),0 0 0 2px rgba(255,255,255,.4);}
#progress-fill{height:100%;border-radius:10px;transition:width .5s cubic-bezier(.34,1.2,.64,1);position:relative;overflow:hidden;}
#progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 1.8s infinite;}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#progress-stars{display:flex;justify-content:center;gap:clamp(2px,1vw,5px);}
.prog-star{font-size:clamp(10px,2.2vw,14px);filter:grayscale(1) opacity(.4);display:inline-block;transition:filter .3s;}
.prog-star.done{filter:none;animation:starPop .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes starPop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
#equation-box{background:rgba(255,255,255,.93);border-radius:18px;padding:7px 22px;box-shadow:0 4px 18px rgba(0,0,0,.13),0 0 0 3px #FFD700;text-align:center;width:min(96vw,540px);}
#equation-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(26px,7vw,50px);color:var(--text-dark);letter-spacing:2px;transition:color .3s;}
#equation-text.success{color:var(--success);animation:pulseG .5s ease;}
#equation-text.err{animation:shakeX .4s ease;}
@keyframes pulseG{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
/* SCALE AREA */
#scale-area{position:relative;width:min(96vw,560px);flex:1;min-height:0;display:flex;align-items:center;justify-content:center;}
#scale-svg{width:100%;height:100%;max-height:280px;overflow:visible;}
#scale-beam-group{transform-origin:200px 130px;transition:transform .65s cubic-bezier(.34,1.3,.64,1);}
#left-pan-apples,#right-pan-apples{position:absolute;pointer-events:none;display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:3px;}
#right-pan-apples.removable{pointer-events:all;}
#right-pan-apples.removable span{cursor:grab;touch-action:none;}
.scale-check-btn{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#F39C12,#E67E22);color:white;border:none;border-radius:50px;padding:10px 26px;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(15px,3.5vw,21px);cursor:pointer;box-shadow:0 5px 0 #A04000,0 8px 18px rgba(243,156,18,.45);transition:transform .1s,box-shadow .1s;white-space:nowrap;z-index:100;}
.scale-check-btn:active{transform:translateX(-50%) translateY(4px);box-shadow:0 1px 0 #A04000;}
.scale-check-btn:disabled{opacity:.5;cursor:default;}
#right-drop-highlight{position:absolute;border-radius:50%;border:3px dashed rgba(255,255,255,.9);background:rgba(255,255,255,.18);pointer-events:none;opacity:0;transition:opacity .2s;}
#right-drop-highlight.active{opacity:1;}
#remove-zone{position:absolute;bottom:0;left:0;right:0;height:26%;border-radius:12px;border:3px dashed rgba(231,76,60,.6);background:rgba(231,76,60,.08);pointer-events:none;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.5vw,14px);font-weight:800;color:rgba(180,0,0,.55);}
#remove-zone.active{opacity:1;}
#next-btn{display:none;background:linear-gradient(135deg,#2ECC71,#27AE60);color:white;border:none;border-radius:50px;padding:12px 34px;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(16px,3.5vw,22px);cursor:pointer;box-shadow:0 4px 0 #1A8A45,0 6px 18px rgba(46,204,113,.4);position:absolute;bottom:10px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);z-index:200;}
/* BASKET AREA (mode 3) */
#basket-area{display:none;width:min(96vw,560px);flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;}
#basket-row{display:flex;align-items:flex-end;justify-content:center;gap:clamp(8px,3vw,20px);width:100%;}
#basket-equals{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(32px,9vw,56px);color:#5C3000;line-height:1;text-shadow:0 2px 0 rgba(255,255,255,.6);flex-shrink:0;}
.bkt-station{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:200px;}
.bkt-img-wrap{position:relative;width:clamp(85px,20vw,130px);}
.bkt-img-wrap img{width:100%;height:auto;display:block;filter:drop-shadow(2px 4px 10px rgba(0,0,0,.25));}
/* Apple overlay inside basket */
.bkt-apples{position:absolute;bottom:18%;left:10%;width:80%;display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:2px;pointer-events:none;z-index:2;}
#right-bkt-wrap.drag-over{filter:brightness(1.12) drop-shadow(0 0 12px rgba(255,200,0,.8));}
.bkt-check-btn{background:linear-gradient(135deg,#F39C12,#E67E22);color:white;border:none;border-radius:50px;padding:10px 28px;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(15px,3.5vw,20px);cursor:pointer;box-shadow:0 5px 0 #A04000,0 8px 18px rgba(243,156,18,.45);transition:transform .1s,box-shadow .1s;white-space:nowrap;}
.bkt-check-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #A04000;}
.bkt-check-btn:disabled{opacity:.5;cursor:default;}
#next-btn-bkt{display:none;background:linear-gradient(135deg,#2ECC71,#27AE60);color:white;border:none;border-radius:50px;padding:10px 28px;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(15px,3.5vw,20px);cursor:pointer;box-shadow:0 4px 0 #1A8A45;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
#remove-zone-bkt{width:100%;padding:8px 0;border-radius:12px;border:3px dashed rgba(231,76,60,.5);background:rgba(231,76,60,.07);pointer-events:none;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.5vw,13px);font-weight:800;color:rgba(180,0,0,.5);}
#remove-zone-bkt.active{opacity:1;}
/* BOTTOM BAR */
#bottom-bar{width:min(96vw,560px);flex-shrink:0;display:flex;flex-direction:row;align-items:stretch;gap:0;}
#crate-area{flex:1;border-radius:16px 0 0 16px;padding:6px 10px 10px;box-shadow:0 -4px 0 #4A2000,0 6px 20px rgba(0,0,0,.28);border:3px solid #A0522D;border-right:none;background:#6B3410;position:relative;overflow:hidden;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#crate-area::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 48px,rgba(0,0,0,.1) 48px,rgba(0,0,0,.1) 52px);pointer-events:none;}
#crate-label{text-align:center;color:#FFD700;font-weight:800;font-size:clamp(10px,2vw,13px);margin-bottom:4px;position:relative;z-index:2;text-shadow:1px 1px 3px rgba(0,0,0,.5);}
#crate-inner{position:relative;z-index:2;}
#basket-img{width:clamp(72px,16vw,104px);height:auto;cursor:grab;touch-action:none;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.4));transition:transform .15s;display:block;}
#basket-img:active{transform:scale(.94);}
#farmer-peek-panel{width:clamp(90px,21vw,135px);flex-shrink:0;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:visible;min-height:88px;background:#5A2C0A;border-radius:0 16px 16px 0;border:3px solid #A0522D;border-left:2px solid rgba(255,200,100,.2);box-shadow:0 -4px 0 #3A1800,0 6px 20px rgba(0,0,0,.28);}
#peek-farmer-wrap{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;height:100%;}
#peek-farmer-img{width:clamp(82px,19vw,122px);height:auto;display:block;margin-bottom:-8px;transition:transform .55s cubic-bezier(.34,1.2,.64,1),opacity .4s;transform:translateY(110%);opacity:0;}
#peek-farmer-img.visible{transform:translateY(0);opacity:1;}
#peek-bubble{position:absolute;bottom:calc(100% + 6px);right:0;background:white;border-radius:12px;padding:7px 11px;box-shadow:0 3px 14px rgba(0,0,0,.2),0 0 0 2px #FFD700;font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(10px,2.2vw,13px);color:#3A1A00;text-align:center;max-width:165px;pointer-events:none;opacity:0;transform:scale(.8) translateY(6px);transition:opacity .3s,transform .3s;z-index:400;line-height:1.3;}
#peek-bubble.visible{opacity:1;transform:scale(1) translateY(0);}
#peek-bubble.wrong-msg{box-shadow:0 3px 14px rgba(0,0,0,.2),0 0 0 2px #E74C3C;color:#C0392B;}
#peek-bubble::after{content:'';position:absolute;bottom:-10px;right:16px;border:5px solid transparent;border-top-color:white;}
/* GHOSTS */
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;font-size:clamp(44px,11vw,62px);filter:drop-shadow(4px 4px 8px rgba(0,0,0,.5));display:none;transform:translate(-50%,-50%) scale(1.2);}
#remove-ghost{position:fixed;pointer-events:none;z-index:9999;font-size:clamp(44px,11vw,62px);filter:drop-shadow(0 0 8px rgba(220,50,50,.7)) saturate(.5);display:none;transform:translate(-50%,-50%) scale(1.1);}
#wrong-overlay{display:none;position:fixed;inset:0;background:rgba(231,76,60,.18);z-index:5000;pointer-events:none;animation:flashR .4s ease;}
@keyframes flashR{0%,100%{opacity:0}50%{opacity:1}}
.confetti-p{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:cfall linear forwards;}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.star-b{position:fixed;font-size:28px;pointer-events:none;z-index:9997;animation:starFly 1s ease-out forwards;}
@keyframes starFly{0%{transform:scale(0) rotate(0deg);opacity:1}50%{transform:scale(1.4) rotate(180deg);opacity:1}100%{transform:scale(.4) rotate(360deg) translateY(-80px);opacity:0}}
@keyframes bounceIn{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
@media(orientation:landscape) and (max-height:480px){#scale-svg{max-height:165px;}#equation-text{font-size:18px;}#basket-img{width:60px;}.bkt-img-wrap{width:70px;}}
</style>
</head>
<body>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div id="wrong-overlay"></div>
<div id="drag-ghost">🍎</div>
<div id="remove-ghost">🍎</div>

<div id="screen-menu" class="screen">
  <div class="menu-card">
    <span class="menu-icon">⚖️</span>
    <div class="menu-title">Terazi Oyunu</div>
    <div class="menu-sub">Eşitliği öğren, teraziyi dengele! 🍎</div>
    <button class="btn-green" onclick="showDifficulty()">🎮 Oyuna Başla!</button>
  </div>
</div>

<div id="screen-difficulty" class="screen hidden">
  <div class="diff-card">
    <div class="diff-title">🎯 Zorluk Seç</div>
    <div class="diff-sub">Hangi seviyeyle oynamak istersin?</div>
    <div class="diff-btns">
      <button class="btn-diff bd1" onclick="startCutscene(1)"><span class="bd-icon">🌟</span><span><span class="bd-name">Seviye 1 — Kolay</span><span class="bd-desc">Büyük sayı = küçük sayı + ? &nbsp;•&nbsp; Elmalar görünür</span></span></button>
      <button class="btn-diff bd2" onclick="startCutscene(2)"><span class="bd-icon">🔥</span><span><span class="bd-name">Seviye 2 — Orta</span><span class="bd-desc">a + b = c + ? &nbsp;•&nbsp; Elmalar görünür</span></span></button>
      <button class="btn-diff bd3" onclick="startCutscene(3)"><span class="bd-icon">🚀</span><span><span class="bd-name">Seviye 3 — Zor</span><span class="bd-desc">a + b = c + ? &nbsp;•&nbsp; Sepetler sabit, sadece matematik!</span></span></button>
    </div>
    <button class="btn-back" onclick="showMenu()">← Geri</button>
  </div>
</div>

<div id="screen-cutscene" class="screen hidden">

<script>
const TOTAL_Q=10;
const S={mode:1,qNum:0,score:0,leftA:0,leftB:0,leftTotal:0,rightStart:0,rightAdded:0,solved:false,beamAngle:0};
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const WRONG_MSGS=['Sanki eşit değil... 🤔','Bir taraf daha fazla!','Terazi eşit değil gibi!','Hmm, kontrol eder misin?','Biraz daha ekle ya da çıkar!','Bir taraf çok ağır!','Tam değil, tekrar dene! 😅'];
const rndWrong=()=>WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
let ac=null;
const getAC=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac;};
const osc=(t,f0,f1,dur,vol,tp)=>{try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.setValueAtTime(f0,c.currentTime);if(f1)o.frequency.exponentialRampToValueAtTime(f1,c.currentTime+dur);g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur+.02);o.start(c.currentTime+t);o.stop(c.currentTime+t+dur+.05);}catch(e){}};
const playPop=()=>osc(0,560,300,.12,.3);
const playRemove=()=>osc(0,280,180,.14,.25);
const playTilt=()=>osc(0,220,170,.22,.12,'triangle');
const playError=()=>osc(0,340,190,.22,.22,'sawtooth');
const playSuccess=()=>[523,659,784,1047].forEach((f,i)=>osc(i*.13,f,0,.3,.3));
const playWin=()=>[523,587,659,698,784,880,988,1047].forEach((f,i)=>osc(i*.1,f,0,.28,.25));
const show=id=>document.getElementById(id).classList.remove('hidden');
const hide=id=>document.getElementById(id).classList.add('hidden');
function showMenu(){show('screen-menu');['screen-difficulty','screen-cutscene','screen-game','screen-win'].forEach(hide);hidePeek();}
function showDifficulty(){show('screen-difficulty');['screen-menu','screen-cutscene','screen-game','screen-win'].forEach(hide);}
function startCutscene(mode){
  S.mode=mode;
  const bub=document.getElementById('cutscene-bubble');
  bub.innerHTML=mode===3
    ?'Bu sefer sepetler sabit! 🧺<br>Elmalar eklenince <span class="gold">sepet hareket etmez</span> — sadece matematiği çöz!'
    :'Merhaba! Bugün terazimi kullanmam lazım 🍎<br><span class="gold">10 işlemi</span> doğru çözerek elmalarımı eşitler misin?';
  show('screen-cutscene');['screen-menu','screen-difficulty','screen-game','screen-win'].forEach(hide);
}
function startGame(){
  S.qNum=0;S.score=0;
  const L3=S.mode===3;
  document.getElementById('scale-area').style.display=L3?'none':'';
  document.getElementById('basket-area').style.display=L3?'flex':'none';
  const clr={1:'linear-gradient(90deg,#27AE60,#2ECC71)',2:'linear-gradient(90deg,#E05500,#FF8C42)',3:'linear-gradient(90deg,#6C3483,#9B59B6)'};
  document.getElementById('progress-fill').style.background=clr[S.mode];
  show('screen-game');['screen-menu','screen-difficulty','screen-cutscene','screen-win'].forEach(hide);
  generatePuzzle();renderAll();
}
function updateProgress(){
  document.getElementById('progress-fill').style.width=(S.qNum/TOTAL_Q*100)+'%';
  document.getElementById('q-num').textContent=S.qNum;
  const el=document.getElementById('progress-stars');el.innerHTML='';
  for(let i=1;i<=TOTAL_Q;i++){const s=document.createElement('span');s.className='prog-star'+(i<S.qNum?' done':'');s.textContent='⭐';el.appendChild(s);}
}
function markStarDone(){const ss=document.querySelectorAll('.prog-star');if(ss[S.qNum-1])ss[S.qNum-1].classList.add('done');}
function checkBalance(){
  if(S.solved)return;
  if(S.rightStart+S.rightAdded===S.leftTotal){
    S.solved=true;S.score+=10;playSuccess();
    document.getElementById('equation-text').classList.add('success');renderEq();
    document.getElementById('score').textContent=S.score;
    if(S.mode===3){
      document.getElementById('check-btn-bkt').disabled=true;
      document.getElementById('next-btn-bkt').style.display='inline-block';
      renderBaskets();
    } else {
      document.getElementById('check-btn-scale').disabled=true;
      document.getElementById('next-btn').style.display='block';
      document.getElementById('right-pan-apples').classList.remove('removable');
    }
    launchConfetti(false);hidePeek();markStarDone();
  } else {
    playError();wrongFlash();shakeEqEl();showFarmerWrong();
  }
}
let peekTimer=null;
function showFarmerWrong(){
  const img=document.getElementById('peek-farmer-img'),bub=document.getElementById('peek-bubble');
  bub.textContent=rndWrong();bub.classList.remove('visible','wrong-msg');void bub.offsetWidth;
  bub.classList.add('visible','wrong-msg');img.classList.add('visible');
  if(peekTimer)clearTimeout(peekTimer);peekTimer=setTimeout(()=>bub.classList.remove('visible','wrong-msg'),2800);
}
function showPeekProg(){
  const rem=TOTAL_Q-S.qNum;if(rem<=0)return;
  const img=document.getElementById('peek-farmer-img'),bub=document.getElementById('peek-bubble');
  bub.classList.remove('wrong-msg');bub.textContent=rem===1?'Son 1 kaldı! 💪':`${rem} kaldı!`;
  img.classList.add('visible');bub.classList.remove('visible');void bub.offsetWidth;bub.classList.add('visible');
  if(peekTimer)clearTimeout(peekTimer);peekTimer=setTimeout(()=>bub.classList.remove('visible'),3000);
}
function hidePeek(){document.getElementById('peek-farmer-img').classList.remove('visible');document.getElementById('peek-bubble').classList.remove('visible');}
function generatePuzzle(){
  S.solved=false;S.rightAdded=0;S.qNum++;
  if(S.mode===1){const t=rand(4,12),rs=rand(1,t-1);S.leftA=t;S.leftB=0;S.leftTotal=t;S.rightStart=rs;}
  else{const a=rand(2,7),b=rand(2,7),t=a+b,rs=rand(1,t-1);S.leftA=a;S.leftB=b;S.leftTotal=t;S.rightStart=rs;}
}
function renderAll(){
  renderEq();updateProgress();
  document.getElementById('score').textContent=S.score;
  document.getElementById('equation-text').className='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('next-btn-bkt').style.display='none';
  document.getElementById('check-btn-scale').disabled=false;
  document.getElementById('check-btn-bkt').disabled=false;
  if(S.mode===3){renderBaskets();}else{updateBeam(true);renderPanApples();}
}
function renderEq(){
  const q=S.rightAdded===0?'?':S.rightAdded;
  document.getElementById('equation-text').textContent=S.leftB===0?`${S.leftTotal} = ${S.rightStart} + ${q}`:`${S.leftA} + ${S.leftB} = ${S.rightStart} + ${q}`;
}
/* ── MODE 3 basket render ── */
function bktAppleSz(n){return n<=3?22:n<=6?18:n<=9?15:12;}
function renderBaskets(){
  // LEFT basket: show leftA red apples + leftB green apples inside
  const ld=document.getElementById('left-bkt-apples');
  ld.className='bkt-apples';ld.innerHTML='';
  const szL=bktAppleSz(S.leftTotal);
  for(let i=0;i<S.leftA;i++){const s=document.createElement('span');s.textContent='🍎';s.style.fontSize=szL+'px';s.style.lineHeight='1';ld.appendChild(s);}
  for(let i=0;i<S.leftB;i++){const s=document.createElement('span');s.textContent='🍏';s.style.fontSize=szL+'px';s.style.lineHeight='1';ld.appendChild(s);}
  // RIGHT basket: show rightStart + added apples
  const rd=document.getElementById('right-bkt-apples');
  rd.className='bkt-apples';rd.innerHTML='';
  const tot=S.rightStart+S.rightAdded,szR=bktAppleSz(Math.max(tot,1));
  for(let i=0;i<tot;i++){
    const s=document.createElement('span');
    s.textContent='🍎';s.style.fontSize=szR+'px';s.style.lineHeight='1';
    if(i>=S.rightStart)s.style.animation='bounceIn .3s cubic-bezier(.34,1.56,.64,1)';
    rd.appendChild(s);
  }
}
/* ── SCALE ── */
function updateBeam(immediate){
  const diff=(S.rightStart+S.rightAdded)-S.leftTotal;
  S.beamAngle=Math.max(-22,Math.min(22,diff*3.5));
  const beam=document.getElementById('scale-beam-group');
  if(immediate){beam.style.transition='none';beam.style.transform=`rotate(${S.beamAngle}deg)`;beam.getBoundingClientRect();beam.style.transition='';}
  else beam.style.transform=`rotate(${S.beamAngle}deg)`;
  positionPans();
  if(!immediate){let s0=null;const step=ts=>{if(!s0)s0=ts;positionPans();if(ts-s0<700)requestAnimationFrame(step);};requestAnimationFrame(step);}
}
function svgPt(svgX,svgY){
  const svg=document.getElementById('scale-svg'),area=document.getElementById('scale-area');
  const sr=svg.getBoundingClientRect(),ar=area.getBoundingClientRect();
  const scX=sr.width/400,scY=sr.height/240,px=200,py=130,rad=S.beamAngle*Math.PI/180;
  const rx=svgX-px,ry=svgY-py;
  return{x:(px+rx*Math.cos(rad)-ry*Math.sin(rad))*scX+(sr.left-ar.left),y:(py+rx*Math.sin(rad)+ry*Math.cos(rad))*scY+(sr.top-ar.top)};
}
function positionPans(){
  const lp=svgPt(74,172),rp=svgPt(326,172),W=104;
  const ld=document.getElementById('left-pan-apples');ld.style.left=(lp.x-W/2)+'px';ld.style.top=(lp.y-44)+'px';ld.style.width=W+'px';
  const rd=document.getElementById('right-pan-apples');rd.style.left=(rp.x-W/2)+'px';rd.style.top=(rp.y-44)+'px';rd.style.width=W+'px';
  const hl=document.getElementById('right-drop-highlight');hl.style.left=(rp.x-54)+'px';hl.style.top=(rp.y-30)+'px';hl.style.width='108px';hl.style.height='62px';
}
const aSz=n=>n<=2?30:n<=4?26:n<=7?22:n<=10?18:15;
function mkA(em,sz,an){const s=document.createElement('span');s.textContent=em;s.style.cssText=`font-size:${sz}px;line-height:1;${an?'animation:bounceIn .3s cubic-bezier(.34,1.56,.64,1);':''}`;return s;}
function renderPanApples(){
  positionPans();
  const ld=document.getElementById('left-pan-apples');ld.innerHTML='';
  const sz=aSz(S.leftTotal);
  if(S.leftB===0){for(let i=0;i<S.leftTotal;i++)ld.appendChild(mkA('🍎',sz,false));}
  else{for(let i=0;i<S.leftA;i++)ld.appendChild(mkA('🍎',sz,false));for(let i=0;i<S.leftB;i++)ld.appendChild(mkA('🍏',sz,false));}
  const rd=document.getElementById('right-pan-apples');rd.innerHTML='';
  if(!S.solved)rd.classList.add('removable');else rd.classList.remove('removable');
  const tot=S.rightStart+S.rightAdded,szR=aSz(Math.max(tot,1));
  for(let i=0;i<tot;i++){const sp=mkA('🍎',szR,i>=S.rightStart);if(!S.solved){sp.style.cursor='grab';sp.style.touchAction='none';sp.addEventListener('mousedown',onRmMD);sp.addEventListener('touchstart',onRmTS,{passive:false});}rd.appendChild(sp);}
}
/* ── ADD DRAG ── */
let addDrag=false;
const addG=document.getElementById('drag-ghost');
function startAdd(x,y){addDrag=true;addG.style.display='block';addG.style.left=x+'px';addG.style.top=y+'px';if(S.mode!==3)document.getElementById('right-drop-highlight').classList.add('active');else document.getElementById('right-bkt-wrap').classList.add('drag-over');}
function moveAdd(x,y){addG.style.left=x+'px';addG.style.top=y+'px';}
function endAdd(x,y){
  addDrag=false;addG.style.display='none';
  document.getElementById('right-drop-highlight').classList.remove('active');
  document.getElementById('right-bkt-wrap').classList.remove('drag-over');
  const hit=S.mode===3?overBkt(x,y):overPan(x,y);if(hit)addItem();
}
document.getElementById('basket-img').addEventListener('mousedown',e=>{if(S.solved)return;e.preventDefault();startAdd(e.clientX,e.clientY);document.addEventListener('mousemove',oAMM);document.addEventListener('mouseup',oAMU);});
document.getElementById('basket-img').addEventListener('touchstart',e=>{if(S.solved)return;e.preventDefault();startAdd(e.touches[0].clientX,e.touches[0].clientY);document.addEventListener('touchmove',oATM,{passive:false});document.addEventListener('touchend',oATE);},{passive:false});
function oAMM(e){if(addDrag)moveAdd(e.clientX,e.clientY);}
function oATM(e){e.preventDefault();if(addDrag)moveAdd(e.touches[0].clientX,e.touches[0].clientY);}
function oAMU(e){endAdd(e.clientX,e.clientY);document.removeEventListener('mousemove',oAMM);document.removeEventListener('mouseup',oAMU);}
function oATE(e){endAdd(e.changedTouches[0].clientX,e.changedTouches[0].clientY);document.removeEventListener('touchmove',oATM);document.removeEventListener('touchend',oATE);}
/* ── REMOVE DRAG ── */
let rmDrag=false;
const rmG=document.getElementById('remove-ghost');
function startRm(x,y,zone){rmDrag=true;rmG.style.display='block';rmG.style.left=x+'px';rmG.style.top=y+'px';document.getElementById(zone).classList.add('active');}
function moveRm(x,y){rmG.style.left=x+'px';rmG.style.top=y+'px';}
function endRm(x,y,zone,hitFn){
  if(!rmDrag)return;rmDrag=false;rmG.style.display='none';
  document.getElementById(zone).classList.remove('active');
  if(!hitFn(x,y)&&S.rightAdded>0)removeItem();
}
// Scale mode: drag apple spans
function onRmMD(e){if(S.solved)return;e.preventDefault();e.stopPropagation();startRm(e.clientX,e.clientY,'remove-zone');document.addEventListener('mousemove',oRMM);document.addEventListener('mouseup',oRMU);}
function onRmTS(e){if(S.solved)return;e.preventDefault();e.stopPropagation();startRm(e.touches[0].clientX,e.touches[0].clientY,'remove-zone');document.addEventListener('touchmove',oRTM,{passive:false});document.addEventListener('touchend',oRTE);}
function oRMM(e){if(rmDrag)moveRm(e.clientX,e.clientY);}function oRTM(e){e.preventDefault();if(rmDrag)moveRm(e.touches[0].clientX,e.touches[0].clientY);}
function oRMU(e){endRm(e.clientX,e.clientY,'remove-zone',overPan);document.removeEventListener('mousemove',oRMM);document.removeEventListener('mouseup',oRMU);}
function oRTE(e){endRm(e.changedTouches[0].clientX,e.changedTouches[0].clientY,'remove-zone',overPan);document.removeEventListener('touchmove',oRTM);document.removeEventListener('touchend',oRTE);}
// Basket mode: drag right basket to remove
document.getElementById('right-bkt-wrap').addEventListener('mousedown',e=>{if(S.solved||S.mode!==3||S.rightAdded<=0)return;e.preventDefault();startRm(e.clientX,e.clientY,'remove-zone-bkt');document.addEventListener('mousemove',oBMM);document.addEventListener('mouseup',oBMU);});
document.getElementById('right-bkt-wrap').addEventListener('touchstart',e=>{if(S.solved||S.mode!==3||S.rightAdded<=0)return;e.preventDefault();startRm(e.touches[0].clientX,e.touches[0].clientY,'remove-zone-bkt');document.addEventListener('touchmove',oBTM,{passive:false});document.addEventListener('touchend',oBTE);},{passive:false});
function oBMM(e){if(rmDrag)moveRm(e.clientX,e.clientY);}function oBTM(e){e.preventDefault();if(rmDrag)moveRm(e.touches[0].clientX,e.touches[0].clientY);}
function oBMU(e){endRm(e.clientX,e.clientY,'remove-zone-bkt',overBkt);document.removeEventListener('mousemove',oBMM);document.removeEventListener('mouseup',oBMU);}
function oBTE(e){endRm(e.changedTouches[0].clientX,e.changedTouches[0].clientY,'remove-zone-bkt',overBkt);document.removeEventListener('touchmove',oBTM);document.removeEventListener('touchend',oBTE);}
/* ── HIT TESTS ── */
function overPan(x,y){const rp=svgPt(326,180),ar=document.getElementById('scale-area').getBoundingClientRect();const cx=rp.x+ar.left,cy=rp.y+ar.top,dx=(x-cx)/82,dy=(y-cy)/62;return dx*dx+dy*dy<=1;}
function overBkt(x,y){const r=document.getElementById('right-bkt-wrap').getBoundingClientRect();return x>=r.left-24&&x<=r.right+24&&y>=r.top-24&&y<=r.bottom+24;}
/* ── ADD / REMOVE ── */
function addItem(){
  if(S.solved)return;S.rightAdded++;playPop();
  if(S.mode===3){renderEq();renderBaskets();}else{playTilt();renderEq();updateBeam(false);renderPanApples();}
}
function removeItem(){
  if(S.solved||S.rightAdded<=0)return;S.rightAdded--;playRemove();
  if(S.mode===3){renderEq();renderBaskets();}else{playTilt();renderEq();updateBeam(false);renderPanApples();}
}
function wrongFlash(){const o=document.getElementById('wrong-overlay');o.style.display='block';setTimeout(()=>o.style.display='none',420);}
function shakeEqEl(){const e=document.getElementById('equation-text');e.classList.add('err');setTimeout(()=>e.classList.remove('err'),420);}
function nextQuestion(){if(S.qNum>=TOTAL_Q){showWinScreen();return;}generatePuzzle();renderAll();showPeekProg();}
function showWinScreen(){
  playWin();launchConfetti(true);
  document.getElementById('win-score-val').textContent=S.score;
  show('screen-win');hide('screen-game');hidePeek();
  let l=0;const lp=setInterval(()=>{launchConfetti(false);if(++l>4)clearInterval(lp);},1200);
}
function launchConfetti(big){
  const cols=['#FFD700','#E63946','#4CAF50','#2196F3','#FF9800','#9C27B0','#FF69B4'];
  for(let i=0;i<(big?80:45);i++)setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti-p';
    c.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'3px'};`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3800);
  },i*20);
  [[18,25],[50,18],[82,28],[33,52],[67,48]].forEach(([l,t],i)=>{
    setTimeout(()=>{const s=document.createElement('div');s.className='star-b';s.style.cssText=`left:${l}vw;top:${t}vh;`;s.textContent=['⭐','🌟','✨','💫'][i%4];document.body.appendChild(s);setTimeout(()=>s.remove(),1200);},i*160);
  });
}
document.addEventListener('DOMContentLoaded',()=>{window.addEventListener('resize',()=>{if(!document.getElementById('screen-game').classList.contains('hidden'))positionPans();});showMenu();});
</script>
